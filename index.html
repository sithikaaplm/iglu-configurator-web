<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>IGLU Altair® Louvre Configurator</title>
<script>
  /* Early error reporter — registered before the main script so it catches even
     a syntax error in an old browser. Shows the real failure instead of a blank page. */
  window.__ranOK = false;
  function __showErr(msg) {
    var b = document.getElementById("jserr");
    if (!b) {
      b = document.createElement("div");
      b.id = "jserr"; b.className = "jserr";
      var host = document.body || document.documentElement;
      host.insertBefore(b, host.firstChild);
    }
    b.textContent = "⚠ Could not build the lists/diagram on this device: " + msg
      + " — try opening this file in Safari or Chrome (Share → Open in Browser).";
    b.style.display = "block";
  }
  window.onerror = function (m, src, line) { __showErr(m + (line ? " (line " + line + ")" : "")); return false; };
  window.addEventListener("error", function (e) { if (e && e.message) __showErr(e.message); });
  window.addEventListener("load", function () {
    setTimeout(function () {
      if (!window.__ranOK) __showErr("the calculator script did not run (the browser may be too old, or the file was opened in a preview that blocks scripts)");
    }, 800);
  });
</script>
<style>
  :root {
    --line: #e2e8f0; --line2: #cbd5e1; --ink: #0f172a; --muted: #64748b;
    --muted2: #94a3b8; --blue: #2563eb; --blue7: #1d4ed8; --emerald: #047857;
    --bg: #f8fafc; --orange: #c2410c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.45 ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
  }
  header { background: #fff; border-bottom: 1px solid var(--line); padding: 18px 24px; }
  header .logo { display: block; height: 46px; width: auto; margin-bottom: 12px; }
  header h1 { margin: 0; font-size: 20px; font-weight: 600; }
  header p { margin: 4px 0 0; font-size: 13px; color: var(--muted); }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 20px 24px; }
  .grid { display: grid; gap: 20px; grid-template-columns: 300px 1fr; align-items: start; }
  @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
  .col { display: flex; flex-direction: column; gap: 16px; min-width: 0; }
  .panel { min-width: 0; background: #fff; border: 1px solid var(--line); border-radius: 10px; padding: 18px; }
  .panel h2 {
    margin: 0 0 12px; font-size: 13px; font-weight: 600; text-transform: uppercase;
    letter-spacing: .04em; color: var(--muted);
  }
  .fld { display: block; margin-bottom: 4px; font-size: 12px; font-weight: 600; color: #334155; }
  .field { margin-bottom: 14px; }
  .toggle { display: flex; flex-wrap: wrap; gap: 6px; }
  .toggle button {
    font: inherit; font-size: 12px; font-weight: 500; padding: 5px 10px; border-radius: 6px;
    cursor: pointer; border: 1px solid var(--line2); background: #fff; color: #334155;
  }
  .toggle button.active { background: var(--blue); border-color: var(--blue); color: #fff; }
  select {
    width: 100%; margin-top: 0; padding: 7px 9px; font: inherit; font-size: 13px;
    border: 1px solid var(--line2); border-radius: 7px; background: #fff;
  }
  select.auto { width: auto; }
  select:focus { outline: 2px solid var(--blue); outline-offset: -1px; border-color: var(--blue); }
  .hpill { display: inline-block; margin-left: 10px; padding: 4px 8px; border-radius: 6px;
           background: #eff6ff; color: var(--blue7); font-size: 12px; font-weight: 600; }
  .hpill .ws { margin-left: 4px; font-weight: 400; color: var(--blue); }
  .panels { margin-top: 6px; border-top: 1px solid var(--line); padding-top: 12px; }
  .panels .ph { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .panels .ph h3 { margin: 0; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
  .addbtn { font: inherit; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 6px;
            cursor: pointer; border: 1px solid #bfdbfe; background: #eff6ff; color: var(--blue7); }
  .prow { display: flex; align-items: center; justify-content: space-between;
          border: 1px solid #dbeafe; background: #eff6ff; border-radius: 7px; padding: 7px 11px; margin-bottom: 8px; }
  .prow span { font-size: 12px; font-weight: 600; color: #334155; }
  .prow button { font: inherit; font-size: 11px; border: none; background: none; color: #f87171; cursor: pointer; }
  .prow button:hover { color: #dc2626; }
  .btns { margin-top: 8px; display: flex; flex-wrap: wrap; gap: 10px; }
  button.act {
    font: inherit; font-size: 13px; font-weight: 600; padding: 8px 14px; border-radius: 7px;
    cursor: pointer; border: 1px solid var(--line2); background: #fff; color: #334155;
  }
  button.act.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  button.act:hover { filter: brightness(.98); }

  /* Box size block */
  .boxsize { margin-bottom: 16px; border: 1px solid #dbeafe; background: #eff6ffaa; border-radius: 10px; padding: 12px; }
  .boxsize .ttl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: var(--blue7); margin-bottom: 6px; }
  .boxsize .row { display: flex; justify-content: space-between; align-items: baseline; }
  .boxsize .row dt { font-size: 13px; color: var(--muted); }
  .boxsize .row dd { margin: 0; font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }

  /* Tables */
  .sect { margin: 14px 0 4px; padding: 5px 10px; border-radius: 5px; background: #eff6ff;
          font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--blue7); }
  .sect:first-child { margin-top: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase;
       letter-spacing: .03em; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--line); }
  td { padding: 6px 10px; border-bottom: 1px solid #f1f5f9; }
  tr:last-child td { border-bottom: none; }
  .num { text-align: right; font-variant-numeric: tabular-nums; }
  .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; }
  .verify { margin-left: 5px; font-size: 11px; color: var(--orange); }
  .formula { font-size: 10px; color: var(--muted2); }
  .breezeway { opacity: .5; filter: grayscale(1); pointer-events: none; }
  .breezeway .note { margin: -2px 0 4px; padding: 0 10px; font-size: 10px; font-style: italic; color: var(--muted2); }

  /* Diagram */
  .diagcap { margin-bottom: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; color: var(--muted); }
  .diagbox { overflow-x: auto; border: 1px solid #f1f5f9; background: #f8fafc; border-radius: 6px; padding: 8px; }
  .diagbox svg { display: block; }
  .legend { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 14px; font-size: 11px; color: var(--muted); }
  .legend i { display: inline-block; width: 12px; height: 12px; border-radius: 3px; border: 1px solid rgba(0,0,0,.1); vertical-align: -1px; margin-right: 5px; }

  /* Optimiser bars */
  .optgroup { margin-bottom: 18px; }
  .optgroup .head { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; margin-bottom: 6px; }
  .optgroup .head h3 { margin: 0; font-size: 13px; font-weight: 600; color: #334155; }
  .optgroup .head h3 span { font-weight: 400; color: var(--muted); }
  .optgroup .sticks-needed { font-size: 12px; font-weight: 600; color: var(--blue7); white-space: nowrap; }
  .stick { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .stick .lbl { width: 28px; text-align: right; font-size: 10px; color: var(--muted2); font-variant-numeric: tabular-nums; flex: none; }
  .bar { display: flex; height: 28px; width: 100%; overflow: hidden; border: 1px solid var(--line2); border-radius: 5px; font-size: 10px; }
  .seg { position: relative; display: flex; align-items: center; justify-content: center; overflow: hidden; min-width: 0;
         font-variant-numeric: tabular-nums; padding: 0 2px; }
  .seg.cut { background: #bae6fd; color: #0c4a6e; border-right: 1px solid rgba(255,255,255,.8); min-width: 2.75rem; }
  .seg.off { background: #f1f5f9; color: var(--muted2); font-style: italic; }
  .seg span { white-space: nowrap; text-overflow: ellipsis; overflow: hidden; }
  .optfoot { margin-top: 6px; font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .optwarn { margin-top: 4px; font-size: 11px; font-weight: 500; color: var(--orange); }
  .intro { margin: 0 0 12px; font-size: 13px; color: #475569; }
  .intro .sub { color: var(--muted); }

  .jserr { display: none; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca;
           padding: 12px 16px; font-size: 13px; }
  @media print { .no-print { display: none !important; } body { background: #fff; } .panel { break-inside: avoid; } }
</style>
</head>

  function ctrlLabel(c){ return c === "keylock" ? "keylock" : "std ctrl"; }
  for (var r = 0; r < RAW_GALLERY.length; r++) {
    var row = RAW_GALLERY[r];
    var blades = row[0];
    GALLERY_PART_NO[blades+":std:standard"]    = row[1];
    GALLERY_PART_NO[blades+":offstd:standard"] = row[2];
    GALLERY_PART_NO[blades+":std:keylock"]     = row[3];
    GALLERY_PART_NO[blades+":offstd:keylock"]  = row[4];
    var h = BLADE_HEIGHTS[blades].height;
    var label = blades + "-blade " + h + "mm";
    var grades = ["std","offstd"], ctrls = ["standard","keylock"];
    for (var gi = 0; gi < grades.length; gi++) for (var ci = 0; ci < ctrls.length; ci++) {
      var g = grades[gi], c = ctrls[ci];
      GALLERY_DESCRIPTION[blades+":"+g+":"+c] = "ATL IGLU " + label + " " + ctrlLabel(c) + " " + gradeLabel(g);
    }
  }
})();

// Extrusion cut-length additions (verified from Size, Cutting & Fixing Details.pdf)
var HEAD_WIDTH_ADD_MM  = 51;   // head cut  = bladeWidth + 51
var SILL_WIDTH_ADD_MM  = 89;   // sill cut  = bladeWidth + 89
var JAMB_HEIGHT_ADD_MM = 20;   // jamb cut  = gallery height + 20
var JAMB_FACE_MM       = HEAD_WIDTH_ADD_MM / 2; // 25.5 — per-jamb face for box width
// Required window/box size
var WEATHERSTRIP_MM     = 5;   // weatherstrip allowance (height)
var BOX_HEIGHT_EXTRA_MM = 55;  // additional box-height allowance
var BOX_WIDTH_EXTRA_MM  = 74;  // additional box-width allowance
// Visual constants
var BLADE_PITCH_MM     = 140;
var GALLERY_TOP_PAD_MM = 22.5;
var HEAD_SECTION_MM    = 51;
var SILL_SECTION_MM    = 52;
var JAMB_SECTION_MM    = 50;
var MAX_PANELS = 6;

// Nesting
var STOCK_LENGTH = 5000;
var KERF = 5;
var EXTRUSION_NAMES = { "24800":"IGLU Head adapter", "24810":"IGLU Jamb adapter", "24820":"IGLU Sill adapter" };

/* ---------- Compute (src/lib/iglu/compute.ts) ---------- */
function computeBom(config) {
  var panels = config.panels, bladeWidth = config.bladeWidth;
  var controlType = config.controlType, grade = config.grade;
  var N = panels.length;

  var gallerySets = panels.map(function (panel) {
    var key = panel.bladeCount + ":" + grade + ":" + controlType;
    var partNo = GALLERY_PART_NO[key] || ("UNKNOWN-" + key);
    var description = GALLERY_DESCRIPTION[key] || partNo;
    return { partNo: partNo, description: description, qty: 1 };
  });

  var totalBlades = panels.reduce(function (s, p) { return s + p.bladeCount; }, 0);
  var bp = BLADE_PARTS[bladeWidth];
  var blades = { partNo: bp.partNo, description: bp.description, qty: totalBlades };

  var headExtrusions = panels.map(function (_, i) {
    return { partNo:"24800", description:"IGLU Head adapter — Panel " + (i+1), qty:1,
             cutLength: bladeWidth + HEAD_WIDTH_ADD_MM, deductionFlag:false,
             formula: bladeWidth + "mm (blade width) + " + HEAD_WIDTH_ADD_MM + "mm = " + (bladeWidth + HEAD_WIDTH_ADD_MM) + "mm" };
  });
  var sillExtrusions = panels.map(function (_, i) {
    return { partNo:"24820", description:"IGLU Sill adapter — Panel " + (i+1), qty:1,
             cutLength: bladeWidth + SILL_WIDTH_ADD_MM, deductionFlag:false,
             formula: bladeWidth + "mm (blade width) + " + SILL_WIDTH_ADD_MM + "mm = " + (bladeWidth + SILL_WIDTH_ADD_MM) + "mm" };
  });

  function jambCut(i) {
    var h = BLADE_HEIGHTS[panels[i].bladeCount].height;
    return { cutLength: h + JAMB_HEIGHT_ADD_MM,
             formula: h + "mm (gallery height) + " + JAMB_HEIGHT_ADD_MM + "mm = " + (h + JAMB_HEIGHT_ADD_MM) + "mm" };
  }
  var jambExtrusions = [];
  var lo = jambCut(0);
  jambExtrusions.push({ partNo:"24810", description:"IGLU Jamb adapter — left outer", qty:1, cutLength:lo.cutLength, formula:lo.formula, deductionFlag:false });
  for (var i = 0; i < N - 1; i++) {
    var lc = jambCut(i), rc = jambCut(i + 1);
    var shared = lc.cutLength >= rc.cutLength ? lc : rc;
    jambExtrusions.push({ partNo:"24810", description:"IGLU Jamb adapter — shared (panels " + (i+1) + "/" + (i+2) + ")", qty:1, cutLength:shared.cutLength, formula:shared.formula, deductionFlag:false });
  }
  var ro = jambCut(N - 1);
  jambExtrusions.push({ partNo:"24810", description:"IGLU Jamb adapter — right outer", qty:1, cutLength:ro.cutLength, formula:ro.formula, deductionFlag:false });

  // Packers — supplied by Breezeway (shown greyed, not part of the manufactured BOM)
  var headPackers = { partNo:"19179", description:"Head packer", qty: 2 * N };
  var sillPackerE = { partNo:"19183", description:"Sill packer E (external)", qty: N };
  var sillPackerI = { partNo:"19184", description:"Sill packer I (internal)", qty: N };
  var jambPackers = { partNo:"19181", description:"Jamb packer", qty: N + 1 };

  return { gallerySets:gallerySets, blades:blades, headExtrusions:headExtrusions,
           sillExtrusions:sillExtrusions, jambExtrusions:jambExtrusions,
           headPackers:headPackers, sillPackerE:sillPackerE, sillPackerI:sillPackerI, jambPackers:jambPackers };
}

function computeOpening(config) {
  var panels = config.panels, bladeWidth = config.bladeWidth, N = panels.length;
  var tallest = Math.max.apply(null, panels.map(function (p) { return BLADE_HEIGHTS[p.bladeCount].height; }));
  var boxWidth = N * bladeWidth + (N + 1) * JAMB_FACE_MM + BOX_WIDTH_EXTRA_MM;
  var boxHeight = tallest + WEATHERSTRIP_MM + JAMB_HEIGHT_ADD_MM + BOX_HEIGHT_EXTRA_MM;
  return { boxWidth: boxWidth, boxHeight: boxHeight };
}

/* ---------- Diagram (src/lib/iglu/diagram.ts) ---------- */
var BLADE_STROKE = "#22d3ee", HEAD_FILL = "#60a5fa", SILL_FILL = "#fbbf24",
    JAMB_FILL = "#fb923c", GALLERY_FILL = "#a855f7", LABEL_COLOR = "#1d2733",
    DIM_COLOR = "#5b6b7b", ACCENT = "#2f6f4f";
var SVG_MAX_W = 560, SVG_MAX_H = 440, MARGIN_L = 96, MARGIN_T = 60, MARGIN_R = 28, MARGIN_B = 44;
function fmt(v) { return String(Math.round(v * 10) / 10); }

function buildDiagram(config) {
  var panels = config.panels, bladeWidth = config.bladeWidth, N = panels.length;
  var opening = computeOpening(config);
  var heights = panels.map(function (p) { return BLADE_HEIGHTS[p.bladeCount].height; });
  var tallest = Math.max.apply(null, heights);

  var totalWmm = N * bladeWidth + (N + 1) * JAMB_SECTION_MM;
  var totalHmm = HEAD_SECTION_MM + tallest + SILL_SECTION_MM;
  var s = Math.min(SVG_MAX_W / totalWmm, SVG_MAX_H / totalHmm);
  var drawW = totalWmm * s, drawH = totalHmm * s;
  var ox = MARGIN_L, oy = MARGIN_T;

  var items = [];
  function rect(o) { o.kind = "rect"; items.push(o); }
  function line(o) { o.kind = "line"; items.push(o); }
  function text(o) { o.kind = "text"; items.push(o); }

  var headTopY = oy, galleryTopY = oy + HEAD_SECTION_MM * s;

  rect({ x:ox, y:headTopY, width:drawW, height:HEAD_SECTION_MM * s, fill:HEAD_FILL });

  for (var i = 0; i < N; i++) {
    var panelX = ox + (i * (bladeWidth + JAMB_SECTION_MM) + JAMB_SECTION_MM) * s;
    var pw = bladeWidth * s, ph = heights[i] * s, bladeCount = panels[i].bladeCount;

    rect({ x:panelX, y:galleryTopY, width:pw, height:ph, fill:GALLERY_FILL, fillOpacity:0.08, stroke:GALLERY_FILL, strokeWidth:0.5 });

    text({ x:panelX + pw / 2, y:headTopY + (HEAD_SECTION_MM * s) / 2 + 3, text:"24800 · " + fmt(bladeWidth + HEAD_WIDTH_ADD_MM) + "mm", fontSize:8, fill:LABEL_COLOR, textAnchor:"middle" });

    rect({ x:panelX, y:galleryTopY + ph, width:pw, height:SILL_SECTION_MM * s, fill:SILL_FILL });

    text({ x:panelX + pw / 2, y:galleryTopY + ph + (SILL_SECTION_MM * s) / 2 + 3, text:"24820 · " + fmt(bladeWidth + SILL_WIDTH_ADD_MM) + "mm", fontSize:8, fill:LABEL_COLOR, textAnchor:"middle" });

    for (var b = 0; b < bladeCount; b++) {
      var by = galleryTopY + (GALLERY_TOP_PAD_MM + b * BLADE_PITCH_MM) * s;
      line({ x1:panelX + 3, y1:by, x2:panelX + pw - 3, y2:by, stroke:BLADE_STROKE, strokeWidth:1.5, strokeDasharray:"6,4" });
    }

    text({ x:panelX + pw / 2, y:galleryTopY + 12, text:bladeCount + " blades", fontSize:9, fill:LABEL_COLOR, textAnchor:"middle" });
    text({ x:panelX + pw / 2, y:galleryTopY + ph - 6, text:fmt(heights[i]) + "mm", fontSize:9, fill:LABEL_COLOR, textAnchor:"middle" });

    var dimY = oy + drawH + 16;
    line({ x1:panelX, y1:dimY, x2:panelX + pw, y2:dimY, stroke:DIM_COLOR, strokeWidth:1 });
    line({ x1:panelX, y1:dimY - 4, x2:panelX, y2:dimY + 4, stroke:DIM_COLOR, strokeWidth:1 });
    line({ x1:panelX + pw, y1:dimY - 4, x2:panelX + pw, y2:dimY + 4, stroke:DIM_COLOR, strokeWidth:1 });
    text({ x:panelX + pw / 2, y:dimY + 16, text:fmt(bladeWidth) + "mm", fontSize:10, fill:LABEL_COLOR, textAnchor:"middle" });
  }

  for (var k = 0; k <= N; k++) {
    var jambX = ox + k * (bladeWidth + JAMB_SECTION_MM) * s;
    var h = k === 0 ? heights[0] : k === N ? heights[N - 1] : Math.max(heights[k - 1], heights[k]);
    rect({ x:jambX, y:galleryTopY, width:JAMB_SECTION_MM * s, height:h * s, fill:JAMB_FILL });
  }

  (function () {
    var panelX = ox + JAMB_SECTION_MM * s;
    var b0y = galleryTopY + GALLERY_TOP_PAD_MM * s;
    var b1y = galleryTopY + (GALLERY_TOP_PAD_MM + BLADE_PITCH_MM) * s;
    var px = panelX + 16;
    line({ x1:px, y1:b0y, x2:px, y2:b1y, stroke:ACCENT, strokeWidth:0.8 });
    line({ x1:px - 3, y1:b0y, x2:px + 3, y2:b0y, stroke:ACCENT, strokeWidth:0.8 });
    line({ x1:px - 3, y1:b1y, x2:px + 3, y2:b1y, stroke:ACCENT, strokeWidth:0.8 });
    var my = (b0y + b1y) / 2;
    text({ x:px + 6, y:my, text:fmt(BLADE_PITCH_MM) + "mm pitch", fontSize:9, fill:ACCENT, textAnchor:"start" });
  })();

  (function () {
    var y = oy - 18;
    line({ x1:ox, y1:y, x2:ox + drawW, y2:y, stroke:ACCENT, strokeWidth:1 });
    line({ x1:ox, y1:y - 4, x2:ox, y2:y + 4, stroke:ACCENT, strokeWidth:1 });
    line({ x1:ox + drawW, y1:y - 4, x2:ox + drawW, y2:y + 4, stroke:ACCENT, strokeWidth:1 });
    text({ x:ox + drawW / 2, y:y - 4, text:"box " + fmt(opening.boxWidth) + "mm", fontSize:11, fill:LABEL_COLOR, textAnchor:"middle" });
  })();

  (function () {
    var x = ox - 22;
    line({ x1:x, y1:oy, x2:x, y2:oy + drawH, stroke:ACCENT, strokeWidth:1 });
    line({ x1:x - 4, y1:oy, x2:x + 4, y2:oy, stroke:ACCENT, strokeWidth:1 });
    line({ x1:x - 4, y1:oy + drawH, x2:x + 4, y2:oy + drawH, stroke:ACCENT, strokeWidth:1 });
    var my = oy + drawH / 2;
    text({ x:x - 4, y:my, text:"box " + fmt(opening.boxHeight) + "mm", fontSize:11, fill:LABEL_COLOR, textAnchor:"middle", transform:"rotate(-90 " + (x - 4) + " " + my + ")" });
  })();

  return { width: ox + drawW + MARGIN_R, height: oy + drawH + MARGIN_B, items: items };
}

function svgEsc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
function renderDiagram(view) {
  var out = '<svg width="' + view.width + '" height="' + view.height + '" viewBox="0 0 ' + view.width + ' ' + view.height + '">';
  for (var i = 0; i < view.items.length; i++) {
    var it = view.items[i];
    if (it.kind === "rect") {
      out += '<rect x="' + it.x + '" y="' + it.y + '" width="' + it.width + '" height="' + it.height + '"'
        + ' fill="' + (it.fill || "none") + '"'
        + (it.stroke ? ' stroke="' + it.stroke + '"' : "")
        + (it.strokeWidth != null ? ' stroke-width="' + it.strokeWidth + '"' : "")
        + (it.fillOpacity != null ? ' fill-opacity="' + it.fillOpacity + '"' : "")
        + (it.rx != null ? ' rx="' + it.rx + '"' : "") + " />";
    } else if (it.kind === "line") {
      out += '<line x1="' + it.x1 + '" y1="' + it.y1 + '" x2="' + it.x2 + '" y2="' + it.y2 + '"'
        + ' stroke="' + (it.stroke || "#333") + '" stroke-width="' + (it.strokeWidth != null ? it.strokeWidth : 1) + '"'
        + (it.strokeDasharray ? ' stroke-dasharray="' + it.strokeDasharray + '"' : "") + " />";
    } else if (it.kind === "text") {
      out += '<text x="' + it.x + '" y="' + it.y + '" font-size="' + (it.fontSize || 10) + '"'
        + ' fill="' + (it.fill || "#333") + '" text-anchor="' + (it.textAnchor || "start") + '"'
        + ' dominant-baseline="middle"'
        + (it.transform ? ' transform="' + it.transform + '"' : "") + ">" + svgEsc(it.text) + "</text>";
    }
  }
  return out + "</svg>";
}

/* ---------- Nesting (src/lib/iglu/nesting.ts) ---------- */
function nestExtrusions(rows) {
  var byCode = {}; var order = [];
  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    if (row.cutLength <= 0 || row.qty <= 0) continue;
    if (!byCode[row.partNo]) { byCode[row.partNo] = []; order.push(row.partNo); }
    for (var q = 0; q < row.qty; q++) byCode[row.partNo].push(row.cutLength);
  }
  var groups = [];
  for (var o = 0; o < order.length; o++) {
    var code = order[o], pieces = byCode[code];
    var sticks = [], oversized = [];
    var sorted = pieces.slice().sort(function (a, b) { return b - a; });
    for (var p = 0; p < sorted.length; p++) {
      var len = sorted[p], need = len + KERF;
      if (need > STOCK_LENGTH) { oversized.push(len); continue; }
      var placed = null;
      for (var st = 0; st < sticks.length; st++) {
        if (sticks[st].used + need <= STOCK_LENGTH) { placed = sticks[st]; break; }
      }
      if (placed) { placed.cuts.push(len); placed.used += need; }
      else { sticks.push({ cuts:[len], used:need, offcut:0 }); }
    }
    for (var si = 0; si < sticks.length; si++) sticks[si].offcut = STOCK_LENGTH - sticks[si].used;
    var totalLen = pieces.reduce(function (a, b) { return a + b; }, 0) - oversized.reduce(function (a, b) { return a + b; }, 0);
    groups.push({
      code: code, name: EXTRUSION_NAMES[code] || code, sticks: sticks,
      pieceCount: pieces.length - oversized.length, totalLength: totalLen,
      sticksNeeded: sticks.length, offcutTotal: sticks.reduce(function (a, s) { return a + s.offcut; }, 0),
      oversized: oversized
    });
  }
  return groups;
}

/* ---------- State ---------- */
var STORAGE_KEY = "iglu-standalone-config-v1";
var panelSeq = 1;
var config = { bladeWidth:500, controlType:"standard", grade:"std", panels:[{ id:"default", bladeCount:8 }] };

function save() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(config)); } catch (e) {} }
function load() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    var c = JSON.parse(raw);
    if (c && c.bladeWidth && c.panels && c.panels.length) {
      c.grade = "std";
      config = c;
    }
  } catch (e) {}
}

/* ---------- Mutations ---------- */
function setBlade(w) { config.bladeWidth = w; onChange(); }
function setControl(c) { config.controlType = c; onChange(); }
function setCount(n) { config.panels = config.panels.map(function (p) { return { id:p.id, bladeCount:n }; }); onChange(); }
function addPanel() {
  if (config.panels.length >= MAX_PANELS) return;
  var shared = (config.panels[0] && config.panels[0].bladeCount) || 8;
  config.panels.push({ id:"p" + (++panelSeq), bladeCount:shared });
  onChange();
}
function removePanel(id) {
  if (config.panels.length <= 1) return;
  config.panels = config.panels.filter(function (p) { return p.id !== id; });
  onChange();
}

/* ---------- Render ---------- */
function h(str) { return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

function renderForm() {
  var shared = config.panels[0] ? config.panels[0].bladeCount : 8;
  var bh = BLADE_HEIGHTS[shared];
  var widths = [300,500,800,1127];

  var html = '<div class="panel no-print"><h2>Configuration</h2>';

  html += '<div class="field"><div class="fld">Blade width</div><div class="toggle">';
  for (var i = 0; i < widths.length; i++) {
    var w = widths[i];
    html += '<button class="' + (config.bladeWidth === w ? "active" : "") + '" onclick="setBlade(' + w + ')">' + w + 'mm</button>';
  }
  html += '</div></div>';

  html += '<div class="field"><div class="fld">Control type</div><div class="toggle">'
    + '<button class="' + (config.controlType === "standard" ? "active" : "") + '" onclick="setControl(\'standard\')">Standard</button>'
    + '<button class="' + (config.controlType === "keylock" ? "active" : "") + '" onclick="setControl(\'keylock\')">Keylock</button>'
    + '</div></div>';

  html += '<div class="field"><div class="fld">Blade count</div><select class="auto" onchange="setCount(Number(this.value))">';
  for (var c = 0; c < VALID_BLADE_COUNTS.length; c++) {
    var n = VALID_BLADE_COUNTS[c];
    html += '<option value="' + n + '"' + (n === shared ? " selected" : "") + '>' + n + ' blades</option>';
  }
  html += '</select><span class="hpill">' + bh.height + 'mm<span class="ws">(+' + (bh.ws - bh.height) + 'mm ws)</span></span></div>';

  html += '<div class="panels"><div class="ph"><h3>Panels (' + config.panels.length + ')</h3>';
  if (config.panels.length < MAX_PANELS) html += '<button class="addbtn" onclick="addPanel()">+ Add panel</button>';
  html += '</div>';
  for (var pi = 0; pi < config.panels.length; pi++) {
    var p = config.panels[pi];
    html += '<div class="prow"><span>Panel ' + (pi + 1) + '</span>';
    if (config.panels.length > 1) html += '<button onclick="removePanel(\'' + p.id + '\')">✕ remove</button>';
    html += '</div>';
  }
  html += '</div>';

  html += '<div class="btns"><button class="act primary" onclick="window.print()">🖨 Print</button>'
    + '<button class="act" onclick="exportCsv()">⬇ Export CSV</button></div>';

  html += '</div>';
  return html;
}

function bomRows(rows, withFormula) {
  var out = "";
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var len = r.cutLength != null ? '<td class="num mono">' + fmt(r.cutLength) + (r.deductionFlag ? '<span class="verify">VERIFY</span>' : "") + '</td>' : "";
    var formula = (withFormula && r.formula) ? '<div class="formula">' + h(r.formula) + '</div>' : "";
    out += '<tr><td class="mono">' + h(r.partNo) + '</td><td>' + h(r.description) + formula + '</td>'
      + '<td class="num">' + r.qty + '</td>' + len + '</tr>';
  }
  return out;
}

function renderBom(bom, opening) {
  var html = '<div class="panel"><h2>Bill of Materials</h2>';

  html += '<div class="boxsize"><div class="ttl">Window size (box)</div>'
    + '<div class="row"><dt>Box (W × H)</dt><dd>' + fmt(opening.boxWidth) + ' × ' + fmt(opening.boxHeight) + ' mm</dd></div></div>';

  html += '<div class="sect">Gallery Sets</div>'
    + '<table><thead><tr><th>Part no.</th><th>Description</th><th class="num">Qty</th></tr></thead><tbody>'
    + bomRows(bom.gallerySets, false) + '</tbody></table>';

  html += '<div class="sect">Glass Blades</div>'
    + '<table><thead><tr><th>Part no.</th><th>Description</th><th class="num">Qty</th></tr></thead><tbody>'
    + bomRows([bom.blades], false) + '</tbody></table>';

  html += '<div class="sect">Head Extrusions (24800)</div>'
    + '<table><thead><tr><th>Part no.</th><th>Description</th><th class="num">Qty</th><th class="num">Cut (mm)</th></tr></thead><tbody>'
    + bomRows(bom.headExtrusions, true) + '</tbody></table>';

  html += '<div class="sect">Sill Extrusions (24820)</div>'
    + '<table><thead><tr><th>Part no.</th><th>Description</th><th class="num">Qty</th><th class="num">Cut (mm)</th></tr></thead><tbody>'
    + bomRows(bom.sillExtrusions, true) + '</tbody></table>';

  html += '<div class="sect">Jamb Extrusions (24810)</div>'
    + '<table><thead><tr><th>Part no.</th><th>Description</th><th class="num">Qty</th><th class="num">Cut (mm)</th></tr></thead><tbody>'
    + bomRows(bom.jambExtrusions, true) + '</tbody></table>';

  html += '<div class="breezeway"><div class="sect">Packer Inserts</div>'
    + '<div class="note">Supplied by Breezeway — not included in this BOM.</div>'
    + '<table><thead><tr><th>Part no.</th><th>Description</th><th class="num">Qty</th></tr></thead><tbody>'
    + bomRows([bom.headPackers, bom.sillPackerE, bom.sillPackerI, bom.jambPackers], false)
    + '</tbody></table></div>';

  html += '</div>';
  return html;
}

function renderOptimiser(rows) {
  var groups = nestExtrusions(rows);
  var html = '<div class="panel"><h2>Optimised cut list (5 m stock)</h2>'
    + '<p class="intro">Frame extrusions nested into 5 m lengths (first-fit, ' + KERF + 'mm saw kerf). '
    + '<span class="sub">Diagrams are not to scale.</span></p>';
  if (groups.length === 0) { return html + '<p class="intro sub">No extrusions to nest.</p></div>'; }

  for (var g = 0; g < groups.length; g++) {
    var grp = groups[g];
    html += '<div class="optgroup"><div class="head">'
      + '<h3>' + h(grp.code) + ' <span>— ' + h(grp.name) + '</span></h3>'
      + '<span class="sticks-needed">' + grp.sticksNeeded + ' × 5 m extrusion' + (grp.sticksNeeded === 1 ? "" : "s") + '</span></div>';

    for (var si = 0; si < grp.sticks.length; si++) {
      var stick = grp.sticks[si];
      html += '<div class="stick"><span class="lbl">' + (grp.sticks.length > 1 ? "#" + (si + 1) : "") + '</span><div class="bar">';
      for (var ci = 0; ci < stick.cuts.length; ci++) {
        var len = stick.cuts[ci];
        html += '<div class="seg cut" style="flex-grow:' + len + ';flex-basis:0" title="' + fmt(len) + 'mm"><span>' + fmt(len) + '</span></div>';
      }
      if (stick.offcut > 0) {
        html += '<div class="seg off" style="flex-grow:' + stick.offcut + ';flex-basis:0" title="offcut ' + fmt(stick.offcut) + 'mm"><span>offcut ' + fmt(stick.offcut) + '</span></div>';
      }
      html += '</div></div>';
    }

    html += '<p class="optfoot">' + grp.pieceCount + ' piece' + (grp.pieceCount === 1 ? "" : "s")
      + ' · ' + fmt(grp.totalLength) + 'mm cut · ' + fmt(grp.offcutTotal) + 'mm offcut</p>';
    if (grp.oversized.length > 0) {
      html += '<p class="optwarn">⚠ ' + grp.oversized.length + ' piece' + (grp.oversized.length === 1 ? "" : "s")
        + ' longer than a 5 m stock length (' + grp.oversized.map(fmt).join(", ") + 'mm) — cannot be cut from one length.</p>';
    }
    html += '</div>';
  }
  return html + '</div>';
}

function renderDiagramPanel(view) {
  return '<div class="panel"><h2>Diagram — to scale</h2>'
    + '<div class="diagcap">Front elevation</div>'
    + '<div class="diagbox">' + renderDiagram(view) + '</div>'
    + '<div class="legend">'
    + '<span><i style="background:#22d3ee"></i>IGLU blades</span>'
    + '<span><i style="background:#60a5fa"></i>Head insert (24800)</span>'
    + '<span><i style="background:#fbbf24"></i>Sill insert (24820)</span>'
    + '<span><i style="background:#fb923c"></i>Jamb inserts (24810)</span>'
    + '</div></div>';
}

function render() {
  var bom = computeBom(config);
  var opening = computeOpening(config);
  var view = buildDiagram(config);
  var rows = bom.headExtrusions.concat(bom.sillExtrusions).concat(bom.jambExtrusions);

  document.getElementById("left").innerHTML = renderForm();
  document.getElementById("right").innerHTML =
    renderBom(bom, opening) + renderDiagramPanel(view) + renderOptimiser(rows);
}

function onChange() { save(); render(); }

/* ---------- CSV export (mirrors src/components/iglu/Configurator.tsx buildCsv) ---------- */
function exportCsv() {
  var bom = computeBom(config), opening = computeOpening(config);
  function q(s) { return '"' + String(s).replace(/"/g, '""') + '"'; }
  var rows = [];
  rows.push("Window Size (Box)");
  rows.push("Metric,Width (mm),Height (mm)");
  rows.push("Box," + opening.boxWidth + "," + opening.boxHeight);
  rows.push("");
  rows.push("Gallery Sets"); rows.push("Part No,Description,Qty");
  bom.gallerySets.forEach(function (r) { rows.push(q(r.partNo) + "," + q(r.description) + "," + r.qty); });
  rows.push(""); rows.push("Glass Blades"); rows.push("Part No,Description,Qty");
  rows.push(q(bom.blades.partNo) + "," + q(bom.blades.description) + "," + bom.blades.qty);
  rows.push(""); rows.push("Head Extrusions (24800)"); rows.push("Part No,Description,Qty,Cut Length (mm)");
  bom.headExtrusions.forEach(function (r) { rows.push(q(r.partNo) + "," + q(r.description) + "," + r.qty + "," + r.cutLength); });
  rows.push(""); rows.push("Sill Extrusions (24820)"); rows.push("Part No,Description,Qty,Cut Length (mm)");
  bom.sillExtrusions.forEach(function (r) { rows.push(q(r.partNo) + "," + q(r.description) + "," + r.qty + "," + r.cutLength); });
  rows.push(""); rows.push("Jamb Extrusions (24810)"); rows.push("Part No,Description,Qty,Cut Length (mm)");
  bom.jambExtrusions.forEach(function (r) { rows.push(q(r.partNo) + "," + q(r.description) + "," + r.qty + "," + r.cutLength); });
  rows.push(""); rows.push("Packer Inserts (supplied by Breezeway — not included)"); rows.push("Part No,Description,Qty");
  [bom.headPackers, bom.sillPackerE, bom.sillPackerI, bom.jambPackers].forEach(function (r) {
    rows.push(q(r.partNo) + "," + q(r.description) + "," + r.qty);
  });
  var csv = rows.join("\n");
  var blob = new Blob([csv], { type:"text/csv" });
  var url = URL.createObjectURL(blob);
  var a = document.createElement("a");
  a.href = url; a.download = "iglu_" + config.panels.length + "panel_" + config.bladeWidth + "mm.csv";
  a.click();
  URL.revokeObjectURL(url);
}

/* ---------- Wire up ---------- */
try {
  load();
  render();
  window.__ranOK = true;
} catch (e) {
  __showErr((e && e.message) ? e.message : String(e));
}
